name: Release

# Fires when a merge to main changes manifest.json. If its version is new, the
# job builds the plugin and creates a draft release tagged with that exact
# version (no "v" prefix, as Obsidian requires). Bumping the version in a PR is
# therefore all it takes to ship — see AGENTS.md "Releasing".
on:
  push:
    branches: [main]
    paths:
      - manifest.json

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Skip if this version was already released
        id: guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(jq -r .version manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists; nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $version has no release yet."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - if: steps.guard.outputs.release == 'true'
        name: Build plugin
        run: |
          npm ci
          npm run build

      - if: steps.guard.outputs.release == 'true'
        name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - if: steps.guard.outputs.release == 'true'
        name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.guard.outputs.version }}"
          gh release create "$version" \
            --title "$version" \
            --target "$GITHUB_SHA" \
            --draft \
            main.js manifest.json styles.css
